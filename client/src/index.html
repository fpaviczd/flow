<!DOCTYPE html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flow – Projekti</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; max-width: 100vw; overflow-x: hidden; }
      body { background: #0f1117; color: #e2e8f0; font-family: 'DM Sans', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
      img { max-width: 100%; height: auto; }
      input, textarea, button { font-family: inherit; box-sizing: border-box; }
      input::placeholder, textarea::placeholder { color: #3d4455; }
      input:focus, textarea:focus { outline: none; }
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-thumb { background: #2a3245; border-radius: 2px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

      /* Admin layout */
      .admin-body { min-height: 100vh; background: #0f1117; width: 100%; max-width: 100vw; overflow-x: hidden; }
      .admin-layout { display: block; width: 100%; }
      .admin-sidebar { display: none; }
      .mobile-only { display: block; }
      .desktop-only { display: none; }
      .task-row:hover .task-actions { opacity: 1 !important; }

      @media (min-width: 768px) {
        .admin-layout { display: flex; min-height: calc(100vh - 52px); }
        .admin-sidebar { display: flex; flex-direction: column; width: 230px; flex-shrink: 0; background: #0d1018; border-right: 1px solid #1e2330; position: sticky; top: 52px; height: calc(100vh - 52px); overflow-y: auto; }
        .mobile-only { display: none; }
        .desktop-only { display: block; flex: 1; min-width: 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
