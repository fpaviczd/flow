<!DOCTYPE html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flow — Arcadian</title>

    <!-- Favicon & homescreen icons -->
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flow" />
    <meta name="theme-color" content="#16202c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; max-width: 100vw; overflow-x: hidden; }
      body { background: #16202c; color: #eef1f5; font-weight: 400; -webkit-font-smoothing: antialiased; letter-spacing: 0.01em; font-family: 'IBM Plex Sans', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; font-size: 14px; }
      .mono { font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', 'Consolas', 'Liberation Mono', monospace; }
      img { max-width: 100%; height: auto; }
      input, textarea, button { font-family: inherit; box-sizing: border-box; }
      input::placeholder, textarea::placeholder { color: #3d4455; }
      input:focus, textarea:focus { outline: none; }
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-thumb { background: #2a3245; border-radius: 2px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

      /* Admin layout */
      .admin-body { min-height: 100vh; background: #16202c; width: 100%; max-width: 100vw; overflow-x: hidden; }
      .admin-layout { display: block; width: 100%; }
      .admin-sidebar { display: none; }
      .mobile-only { display: block; }
      .desktop-only { display: none; }
      .task-row:hover .task-actions { opacity: 1 !important; }
      .sidebar-item { transition: background 0.2s ease, box-shadow 0.2s ease; border-radius: 10px; }
      .sidebar-item:hover { background: rgba(137,180,250,0.08) !important; }

      @media (min-width: 768px) {
        .admin-layout { margin-left: 280px; min-height: calc(100vh - 48px); }
        .admin-sidebar {
          display: flex;
          flex-direction: column;
          width: 280px;
          position: fixed;
          top: 48px;
          left: 0;
          bottom: 0;
          background: #1b2636;
          border-right: 1px solid #26344a;
          overflow-y: auto;
          z-index: 50;
        }
        .mobile-only { display: none; }
        .desktop-only { display: block; padding: 28px 32px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
